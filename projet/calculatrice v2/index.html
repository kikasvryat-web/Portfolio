<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculatrice V2</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="calculatrice">

            <div id="ecran" class="ecran">0</div>

            <div class="boutons"> 
                <!--1er ligne-->
                <button id="btnClear" class="btn btn-fonction">C</button>
                <button id="btnPlusMoins" class="btn btn-fonction">±</button>
                <button id="btnPourcent" class="btn btn-fonction">%</button>
                <button id="btnDiviser" class="btn btn-fonction">÷</button>
                <!--2ème ligne-->
                <button data-numero="7" class="btn btn-numero">7</button>
                <button data-numero="8" class="btn btn-numero">8</button>
                <button data-numero="9" class="btn btn-numero">9</button>
                <button id="btnMultiplier" class="btn btn-fonction">x</button>
                <!--3ème ligne-->
                <button data-numero="4" class="btn btn-numero">4</button>
                <button data-numero="5" class="btn btn-numero">5</button>
                <button data-numero="6" class="btn btn-numero">6</button>
                <button id="btnSoustraire" class="btn btn-fonction">-</button>
                <!--4ème ligne-->
                <button data-numero="1" class="btn btn-numero">1</button>
                <button data-numero="2" class="btn btn-numero">2</button>
                <button data-numero="3" class="btn btn-numero">3</button>
                <button id="btnAdditionner" class="btn btn-fonction">+</button>
                <!--5ème ligne-->
                <button data-numero="0" class="btn btn-numero btn-zero">0</button>
                <button id="btnVirgule" class="btn">.</button>
                <button id="btnEgal" class="btn btn-egal">=</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
