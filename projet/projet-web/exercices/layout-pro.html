<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Pro</title>
    <link rel="stylesheet" href="layout-pro.css">
</head>
<body>
    <!-- NAVBAR (Flexbox) -->
    <nav class="navbar">
        <div class="logo">PortfolioPro</div>
        <ul class="nav-links">
            <li><a href="#">Projets</a></li>
            <li><a href="#">Compétences</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- CONTENU PRINCIPAL -->
    <main class="container">
        <h1>Mes Projets</h1>
        
        <!-- GALERIE (Grid) -->
        <div class="gallery">
            <div class="project-card">Projet 1</div>
            <div class="project-card featured">Projet Vedette</div>
            <div class="project-card">Projet 3</div>
            <div class="project-card">Projet 4</div>
            <div class="project-card">Projet 5</div>
            <div class="project-card">Projet 6</div>
        </div>
    </main>

    <!-- FOOTER (Flexbox) -->
    <footer class="footer">
        <div class="footer-column">
            <h4>Navigation</h4>
            <ul>
                <li><a href="#">Accueil</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </div>
        <div class="footer-column">
            <h4>Contact</h4>
            <p>Email : pro@mail.com</p>
        </div>
        <div class="footer-column">
            <h4>Réseaux</h4>
            <p>LinkedIn | GitHub</p>
        </div>
    </footer>
</body>
</html>
